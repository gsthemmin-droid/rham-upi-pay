<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay R H A M & Associates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1a2a6c, #2c3e50);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .logo {
    max-width: 260px;
    width: 100%;
    height: auto;
    margin: 0 auto 20px;
    display: block;
  }
  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .upi-id {
    background: #f5f6fa;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #444;
    margin-bottom: 24px;
    word-break: break-all;
  }
  .pay-btn {
    display: block;
    background: #1a2a6c;
    color: #fff;
    text-decoration: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .pay-btn:active { opacity: 0.8; }
  .pay-btn.alt {
    background: #f5f6fa;
    color: #1a2a6c;
    border: 1px solid #e0e3ec;
    font-size: 15px;
    padding: 13px;
  }
  .status {
    font-size: 13px;
    color: #999;
    margin-top: 16px;
  }
  .apps {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
  }
</style>
